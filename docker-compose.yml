services:
  app:
    build: .
    restart: always
    init: true
    env_file:
      - .env
    depends_on:
      - postgres
    volumes:
      - ./storage:/app/storage
    ports:
      - "127.0.0.1:3000:3000"
    mem_limit: 768m
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"

  postgres:
    image: postgres:15
    restart: always
    environment:
      POSTGRES_DB: workwear
      POSTGRES_USER: workwear
      POSTGRES_PASSWORD: change_me
    volumes:
      - postgres_data:/var/lib/postgresql/data
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"

volumes:
  postgres_data:
